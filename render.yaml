services:
  - type: web
    name: coconut-wireless
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn coconut_wireless.wsgi --log-file -
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: coconut-wireless-db
          property: connectionString

databases:
  - name: coconut-wireless-db
    plan: starter
