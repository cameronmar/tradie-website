name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  django:
    runs-on: ubuntu-latest
    env:
      DJANGO_ENV: production
      DEBUG: "False"
      # Falls back to a CI-only key when the secret is not yet configured; never use this value in production.
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY_CI || 'ci-only-not-for-production-coconutwireless-fj-placeholder' }}
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CSRF_TRUSTED_ORIGINS: https://localhost,https://example.com
      DATABASE_URL: sqlite:///db.sqlite3
      # Object storage — dummy values satisfy production startup checks; no real S3 calls are made in CI
      OBJECT_STORAGE_BACKEND: s3
      AWS_STORAGE_BUCKET_NAME: ci-test-bucket
      AWS_ACCESS_KEY_ID: ci-test-key-id
      AWS_SECRET_ACCESS_KEY: ci-test-secret-key
      AWS_S3_ENDPOINT_URL: https://ci-test.r2.cloudflarestorage.com
      # SMTP — dummy values satisfy production startup checks; no email is sent in CI
      EMAIL_HOST: smtp.ci-test.example.com
      EMAIL_HOST_USER: ci@example.com
      EMAIL_HOST_PASSWORD: ci-test-password
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check --deploy

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run test suite
        run: python manage.py test

      - name: Run smoke test
        run: python admin_smoke_test.py
