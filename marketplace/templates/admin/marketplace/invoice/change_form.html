{% extends "admin/change_form.html" %}

{% block object-tools-items %}
  {% if original and original.status != 'void' %}
  <li>
    <form method="post" action="{% url 'admin:marketplace_invoice_send' original.pk %}" style="display:inline;">
      {% csrf_token %}
      <button type="submit" class="default" style="margin:0;">Send Invoice</button>
    </form>
  </li>
  <li>
    <form method="post" action="{% url 'admin:marketplace_invoice_void' original.pk %}" style="display:inline;" onsubmit="return confirm('Void this invoice? Linked platform fees will return to pending unless already paid.');">
      {% csrf_token %}
      <button type="submit" style="margin:0;">Void Invoice</button>
    </form>
  </li>
  {% endif %}
  {{ block.super }}
{% endblock %}
